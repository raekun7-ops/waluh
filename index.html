<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, initial-scale=0.28, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes" />
    <title>Laporan Pinjaman Margasari</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="report-card" aria-label="Laporan pinjaman">
        <header class="report-header">
          <div>
            <p class="eyebrow">Laporan Harian</p>
            <h1 id="unitTitle">MARGASARI</h1>
          </div>
          <div class="toolbar" aria-label="Aksi laporan">
            <div class="toolbar-theme-wrap">
            <button id="themeBtn" class="tool-btn ghost" type="button" title="Ganti tema warna">
              <span id="themeBtnDot" class="theme-btn-dot" aria-hidden="true"></span>
              Tema
            </button>
            </div>
            <button id="addMantriBtn" class="tool-btn" type="button" title="Tambah mantri">
              <span aria-hidden="true">+</span>
              Mantri
            </button>
            <div class="loan-picker">
              <select id="loanTypeSelect" aria-label="Pilih pinjaman">
                <option value="KUR">KUR</option>
                <option value="CASHCOL">CASHCOL</option>
                <option value="KPP">KPP</option>
                <option value="KUPEDES">KUPEDES</option>
                <option value="KUPERA">KUPERA</option>
                <option value="BRIGUNA">BRIGUNA</option>
                <option value="UMI">UMI</option>
              </select>
              <button id="addLoanBtn" class="tool-btn" type="button" title="Tambah pinjaman">
                <span aria-hidden="true">+</span>
                Pinjaman
              </button>
            </div>
            <button id="printBtn" class="tool-btn ghost" type="button" title="Simpan laporan sebagai gambar">
              <span aria-hidden="true">PNG</span>
              Gambar
            </button>
            <button id="resetBtn" class="tool-btn ghost reset-btn" type="button" title="Reset data contoh" aria-label="Reset data contoh">
              <span aria-hidden="true">&#8634;</span>
              Reset
            </button>
            <button id="syncNowBtn" class="icon-btn" type="button" title="Sync data ke cloud sekarang" aria-label="Sync sekarang" style="font-size:1.1rem;">☁</button>
          </div>
          <label id="dateToggleWrap" class="date-toggle-wrap" title="Tampilkan tanggal di laporan">
            <input type="checkbox" id="dateToggle" checked />
            <span class="date-toggle-box" aria-hidden="true"></span>
            <span id="dateLiveDisplay" class="date-live-display"></span>
          </label>
        </header>

        <div class="table-wrap">
          <table class="report-table">
            <thead id="reportHead"></thead>
            <tbody id="reportBody"></tbody>
            <tfoot id="reportFoot"></tfoot>
          </table>
        </div>
      </section>
    </main>

    <div id="syncStatus" class="sync-toast"></div>
    <script src="script.js"></script>
  </body>
</html>
